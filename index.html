<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global 3D Layered Wind Grid</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #controlPanel { position: absolute; top: 15px; left: 15px; background: rgba(10, 16, 26, 0.9); color: #fff; padding: 15px; border-radius: 6px; z-index: 1000; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #1b2a47; width: 220px; }
    .control-group { margin-bottom: 12px; }
    label { font-size: 11px; text-transform: uppercase; color: #7f8c8d; display: block; margin-bottom: 4px; }
    select { background: #1b2a47; color: white; border: 1px solid #34495e; padding: 6px; border-radius: 4px; width: 100%; }
    #metaDisplay { font-size: 11px; color: #bdc3c7; line-height: 1.4; border-top: 1px solid #2c3e50; padding-top: 10px; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="controlPanel">
    <div class="control-group">
      <label>Atmospheric Model</label>
      <select id="modelSelect" onchange="updateWindLayer()">
        <option value="gfs">GFS (NOAA)</option>
        <option value="ifs">IFS (ECMWF Core)</option>
        <option value="aifs">AIFS (ECMWF AI)</option>
      </select>
    </div>
    
    <div class="control-group">
      <label>Altitude / Layer</label>
      <select id="levelSelect" onchange="updateWindLayer()">
        <option value="10m">Surface (10 Meter)</option>
        <option value="850">850 hPa (~1,500 m)</option>
        <option value="700">700 hPa (~3,000 m)</option>
        <option value="500">500 hPa (~5,500 m)</option>
        <option value="200">200 hPa (~12,000 m Jetstream)</option>
      </select>
    </div>

    <div id="metaDisplay">Loading arrays...</div>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    const viewer = new Cesium.Viewer('cesiumContainer', { baseLayerPicker: false, animation: false, timeline: false });
    let activePrimitive = null;

    async function updateWindLayer() {
      const model = document.getElementById("modelSelect").value;
      const level = document.getElementById("levelSelect").value;
      const display = document.getElementById("metaDisplay");
      
      display.innerHTML = `Loading ${model.toUpperCase()} @ ${level}...`;

      try {
        if (activePrimitive) viewer.scene.primitives.remove(activePrimitive);
        
        // Target format generated by your python loop: e.g. ./data/gfs_500_wind.json
        const jsonRes = await fetch(`./data/${model}_${level}_wind.json`);
        if (!jsonRes.ok) throw new Error("Layer array not available.");
        const meta = await jsonRes.json();

        const windImage = new Image();
        windImage.src = `./data/${model}_${level}_wind.png`;
        
        windImage.onload = () => {
          display.innerHTML = `
            <b>Valid:</b> ${meta.refTime}<br/>
            <b>U Range:</b> ${meta.uMin.toFixed(1)} : ${meta.uMax.toFixed(1)} m/s<br/>
            <b>V Range:</b> ${meta.vMin.toFixed(1)} : ${meta.vMax.toFixed(1)} m/s
          `;

          // Pass the loaded layer texture straight to the WebGL rendering context
          activePrimitive = createWindPrimitive(viewer.scene.context, windImage, meta);
          viewer.scene.primitives.add(activePrimitive);
        };
      } catch (err) {
        display.innerHTML = `<span style="color:#e74c3c;">Layer missing or processing.</span>`;
      }
    }

    function createWindPrimitive(context, img, meta) {
      // Setup logic scales points across the WebGL context mapping viewport
      const count = 40000; 
      const positions = new Float32Array(count * 3);
      const texCoords = new Float32Array(count * 2);

      for (let i = 0; i < count; i++) {
        const u = Math.random(); const v = Math.random();
        texCoords[i * 2] = u; texCoords[i * 2 + 1] = v;

        const lon = Cesium.Math.lerp(meta.bounds[0], meta.bounds[2], u);
        const lat = Cesium.Math.lerp(meta.bounds[1], meta.bounds[3], v);
        
        // Dynamically adjust render height based on weather layer altitude
        const heightMeters = meta.level === "10m" ? 2000 : (1000 * (1000 - parseInt(meta.level)) / 100);
        const cartesian = Cesium.Cartesian3.fromDegrees(lon, lat, Math.max(heightMeters, 5000));
        
        positions[i * 3] = cartesian.x; positions[i * 3 + 1] = cartesian.y; positions[i * 3 + 2] = cartesian.z;
      }

      const windTexture = new Cesium.Texture({ context: context, source: img });
      const geometry = new Cesium.Geometry({
        attributes: {
          position: new Cesium.GeometryAttribute({ componentDatatype: Cesium.ComponentDatatype.DOUBLE, componentsPerAttribute: 3, values: positions }),
          st: new Cesium.GeometryAttribute({ componentDatatype: Cesium.ComponentDatatype.FLOAT, componentsPerAttribute: 2, values: texCoords })
        },
        primitiveType: Cesium.PrimitiveType.POINTS
      });

      return new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({ geometry: geometry }),
        appearance: new Cesium.Appearance({
          vertexShaderSource: `
            attribute vec3 position; attribute vec2 st; varying vec4 v_color;
            uniform sampler2D u_tex; uniform float uMin, uMax, vMin, vMax;
            void main() {
              vec4 c = texture2D(u_tex, st);
              float u = uMin + (c.r * (uMax - uMin)); float v = vMin + (c.g * (vMax - vMin));
              v_color = vec4(0.3, 0.6 + (length(vec2(u,v))/50.0), 1.0, 0.8);
              gl_Position = czm_modelViewProjection * vec4(position, 1.0);
              gl_PointSize = 2.5;
            }`,
          fragmentShaderSource: `varying vec4 v_color; void main() { gl_FragColor = v_color; }`,
          renderState: { blending: Cesium.BlendingState.ALPHA_BLEND, depthMask: false }
        }),
        asynchronous: false
      });
    }

    window.onload = () => { updateWindLayer(); };
  </script>
</body>
</html>
